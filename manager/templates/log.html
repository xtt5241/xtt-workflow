<!doctype html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ name }}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='dashboard.css') }}" rel="stylesheet">
</head>
<body>
  <main class="container py-4">
    <section class="card border-0 shadow-lg overflow-hidden">
      <div class="card-body p-4 p-lg-5">
        <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
          <div>
            <a class="btn btn-outline-light btn-sm mb-3" href="/">
              <i class="bi bi-arrow-left me-2"></i>返回控制台
            </a>
            <h1 class="h3 mb-2">{{ name }}</h1>
            <div class="text-secondary">{{ mtime }} · {{ size_kb }} KB</div>
          </div>
        </div>
        <pre class="log-pre mb-0">{{ content }}</pre>
      </div>
    </section>
  </main>
</body>
</html>
